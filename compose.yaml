services:
  etcd:
    container_name: milvus-etcd
    env_file: .env.compose
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/.volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:${ETCD_PORT:-2379} -listen-client-urls http://0.0.0.0:${ETCD_PORT:-2379} --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    env_file: .env.compose
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:${MINIO_CONSOLE_PORT:-9001}"
      - "${MINIO_PORT:-9000}:${MINIO_PORT:-9000}"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/.volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:${MINIO_PORT:-9000}/minio/health/live",
        ]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    env_file: .env.compose
    image: milvusdb/milvus:v2.6.11
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:${ETCD_PORT:-2379}
      MINIO_ADDRESS: minio:${MINIO_PORT:-9000}
      MQ_TYPE: woodpecker
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/.volumes/milvus:/var/lib/milvus
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:${MILVUS_HEALTH_PORT:-9091}/healthz",
        ]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "${MILVUS_PORT:-19530}:${MILVUS_PORT:-19530}"
      - "${MILVUS_HEALTH_PORT:-9091}:${MILVUS_HEALTH_PORT:-9091}"
    depends_on:
      - "etcd"
      - "minio"
  cache:
    image: redis:8-alpine
    container_name: redis-cache
    env_file: .env.compose
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "20"
      - "1"
      - --loglevel
      - warning
      - --requirepass
      - ${REDIS_PASSWORD:-dev-redis-password}
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/.volumes/redis:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli -a "$REDIS_PASSWORD" -p 6379 ping | grep -q PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  ui:
    image: ghcr.io/open-webui/open-webui:v0.8.6
    container_name: open-webui
    env_file: .env.compose
    network_mode: host
    environment:
      WEBUI_AUTH: false
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-http://localhost:8000/api/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-unused}
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/.volumes/open-webui:/app/backend/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auralext-rag-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Use container hostnames when running in the Docker Compose network
      - MILVUS_URI=http://standalone:19530
      - REDIS_HOST=cache
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      standalone:
        condition: service_healthy
      cache:
        condition: service_healthy

networks:
  default:
    name: milvus

